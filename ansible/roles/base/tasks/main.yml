---
- import_tasks: users.yml

- name: Bootstrap base-devel (needed for AUR builds)
  community.general.pacman:
    name: base-devel
    state: present
  become: yes

- import_tasks: reflector.yml
- import_tasks: locale.yml

- name: Update all packages on the system
  community.general.pacman:
    update_cache: yes
    upgrade: yes
  become: yes

- name: Install yay from the AUR using kewlfft.aur.aur
  become: yes
  become_user: aur_builder
  kewlfft.aur.aur:
    name: yay
    state: present

- name: Install some common tools and core dependencies
  become: yes
  become_user: aur_builder
  kewlfft.aur.aur:
    name:
      - archlinux-keyring
      - aspell-en
      - aspell-uk
      - base-devel
      - bat
      - btop
      - curl
      - direnv
      - git
      - htop
      - imagemagick
      - lsd
      - make
      - neofetch
      - networkmanager
      - starship
      - pacman-contrib
      - ranger
      - rsync
      - shellcheck
      - tuckr
      - sysz
      - thefuck
      - trash-cli
      - tree
      - wget
      - yazi
      - zoxide
      - zsh
    state: present

- import_tasks: nobeep.yml
- import_tasks: entropy.yml
